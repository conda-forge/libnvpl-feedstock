{% set version = "25.11" %}

package:
  name: libnvpl-split
  version: {{ (version ~ ".0.0").split('.')[:3] | join('.') }}

source:
  # Trick the autotick bot into opening PRs for this feedstock by adding a source URL
  # TODO: We could use this JSON to test that the packages are pinned correctly
  - url: https://developer.download.nvidia.com/compute/nvpl/redist/redistrib_{{ version }}.json
    sha256: d53506cafacc8e7a53a0294e0ecf52939a10c43b1832976646140e6fe83a8a10

build:
  number: 0

# All of the NVPL components development packages depend on this mutex which
# constrains the environment to a matching set of packages. The mutex only
# constrains development packages; runtime packages are constrained by their
# soname which tracks ABI compatability.
# https://developer.download.nvidia.com/compute/nvpl/redist/

outputs:

  - name: _nvpl_dev_mutex
    build:
      noarch: generic
    requirements:
      run_constrained:
        - libnvpl-blas-dev 0.5.0.*
        - libnvpl-common-dev 0.3.4.*
        - libnvpl-fft-dev 0.5.0.*
        - libnvpl-lapack-dev 0.3.2.*
        - libnvpl-rand-dev 0.5.3.*
        - libnvpl-scalapack-dev 0.2.3.*
        - libnvpl-sparse-dev 0.5.0.*
        - libnvpl-tensor-dev 0.3.2.*
    test:
      commands: []

  - name: libnvpl-dev
    build:
      noarch: generic
    requirements:
      run:
        - {{ pin_subpackage('_nvpl_dev_mutex', exact=True) }}
        - libnvpl-blas-dev
        - libnvpl-common-dev
        - libnvpl-fft-dev
        - libnvpl-lapack-dev
        - libnvpl-rand-dev
        - libnvpl-scalapack-dev
        - libnvpl-sparse-dev
        - libnvpl-tensor-dev
    test:
      commands: []

about:
  home: https://developer.nvidia.com/nvpl
  license: LicenseRef-NVIDIA-End-User-License-Agreement
  license_url: https://docs.nvidia.com/nvpl/license.html
  summary: >-
    The NVIDIA Performance Libraries (NVPL). For convenience only! Not to be
    used in host requirements for conda recipes!

extra:
  feedstock-name: libnvpl
  recipe-maintainers:
    - conda-forge/cuda
